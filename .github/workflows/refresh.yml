name: Daily refresh

# Re-researches every company already in the dashboard once a day, so newly
# surfaced senior ex-employees are added automatically (existing people are
# refreshed; nothing is deleted). Also runs on demand.

on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC daily (~07:00 IST)
  workflow_dispatch:

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Refresh all tracked companies
        env:
          REFRESH_ALL: "1"
          SOURCES: "search"
          WORKER_URL: ${{ secrets.WORKER_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: node index.mjs
